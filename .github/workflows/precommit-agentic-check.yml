name: Precommit Agentic Check

on:
  pull_request:
    paths:
      - precommit-agentic-check/**
      - .github/workflows/precommit-agentic-check.yml
  push:
    branches:
      - main
      - first_release
    tags:
      - precommit-agentic-check-v*
    paths:
      - precommit-agentic-check/**
      - .github/workflows/precommit-agentic-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./precommit-agentic-check

      - name: Run tests
        run: python -m unittest discover -s precommit-agentic-check/tests -v

  build:
    if: startsWith(github.ref, 'refs/tags/precommit-agentic-check-v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build precommit-agentic-check --outdir precommit-agentic-check/dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: precommit-agentic-check-dist
          path: precommit-agentic-check/dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/precommit-agentic-check-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: precommit-agentic-check-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
